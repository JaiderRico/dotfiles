# ===================================================
# CONFIGURACIÓN DE HYPRLAND
# ===================================================

# ─── MONITOR ────────────────────────────────
monitor=,preferred,auto,1

# ─── PROGRAMAS QUE SE INICIAN AUTOMÁTICAMENTE ───
exec-once = waybar                                    # barra de estado
exec-once = awww-daemon                               # demonio para fondos animados
exec-once = awww img /home/jaider/Pictures/fondo.png  # establece fondo con awww
exec-once = hypridle                                  # gestor de inactividad (bloqueo, suspensión)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1  # autenticación gráfica (pkexec)
exec-once = wl-paste --type text --watch cliphist store   # guarda historial de texto copiado
exec-once = wl-paste --type image --watch cliphist store  # guarda historial de imágenes copiadas
exec-once = nm-applet                                 # icono de red en la bandeja

# ─── VARIABLES DE ENTORNO ─────────────────
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = GTK_THEME,catppuccin-mocha
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ─── ENTRADA ──────────────────────────────
input {
    kb_layout = es
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0.5
}

# ─── APARIENCIA GENERAL ──────────────────
general {
    gaps_in = 8
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(1e1e2eaa)
    layout = dwindle    # distribución en espiral (dwindle)
}

# ─── DECORACIONES Y DESENFOQUE ────────────
decoration {
    rounding = 20
    blur {
        enabled = true
        size = 10
        passes = 4
        new_optimizations = true
    }
}

# ─── ANIMACIONES ──────────────────────────
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ─── COMPORTAMIENTO DE DWINDLE ─────────────
dwindle {
    preserve_split = true
}

# ─── MISCELÁNEA ───────────────────────────
misc {
    force_default_wallpaper = 0          # no imponer fondo por defecto
    disable_hyprland_logo = true         # quitar logo amarillo
}
input {
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace
gesture = 4, up, fullscreen
gesture = 3, down, float
gesture = 4, down, close
# =====================================================================
# TECLA MODIFICADORA
# =====================================================================
$mod = SUPER

# ===================================================
# LANZAMIENTO DE PROGRAMAS
# ===================================================

# SUPER + Q → Abre la terminal Kitty
bind = $mod, Q, exec, kitty

# SUPER + C → Cierra la ventana activa
bind = $mod, C, killactive

# SUPER + M → Cierra la sesión de Hyprland (logout)
bind = $mod, M, exit

# SUPER + E → Abre el explorador de archivos Nautilus
bind = $mod, E, exec, nautilus

# SUPER + R → Abre el lanzador de aplicaciones Rofi (modo drun)
bind = $mod, R, exec, rofi -show drun

# SUPER + F → Conmuta la ventana activa a pantalla completa
bind = $mod, F, fullscreen

# SUPER + V → Abre el historial del portapapeles (cliphist) con Rofi
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# (Opcional) SUPER + T → Abre Firefox (puedes descomentar y cambiar por tu navegador)
bind = $mod, T, exec, firefox

# ===================================================
# MOVIMIENTO DEL FOCO (cambiar ventana activa)
# ===================================================

# SUPER + ← → Foco a la ventana de la izquierda
bind = $mod, left, movefocus, l

# SUPER + → → Foco a la derecha
bind = $mod, right, movefocus, r

# SUPER + ↑ → Foco hacia arriba
bind = $mod, up, movefocus, u

# SUPER + ↓ → Foco hacia abajo
bind = $mod, down, movefocus, d

# ===================================================
# MOVER VENTANAS (cambiar de posición en el mosaico)
# ===================================================

# SUPER + SHIFT + ← → Mueve la ventana activa a la izquierda
bind = $mod SHIFT, left, movewindow, l

# SUPER + SHIFT + → → Mueve la ventana a la derecha
bind = $mod SHIFT, right, movewindow, r

# SUPER + SHIFT + ↑ → Mueve la ventana hacia arriba
bind = $mod SHIFT, up, movewindow, u

# SUPER + SHIFT + ↓ → Mueve la ventana hacia abajo
bind = $mod SHIFT, down, movewindow, d

# ===================================================
# WORKSPACES (escritorios virtuales)
# ===================================================

# SUPER + 1 → Cambia al escritorio 1
bind = $mod, 1, workspace, 1

# SUPER + 2 → Escritorio 2
bind = $mod, 2, workspace, 2

# SUPER + 3 → Escritorio 3
bind = $mod, 3, workspace, 3

# SUPER + 4 → Escritorio 4
bind = $mod, 4, workspace, 4

# SUPER + 5 → Escritorio 5
bind = $mod, 5, workspace, 5

# SUPER + SHIFT + 1 → Mueve la ventana activa al escritorio 1
bind = $mod SHIFT, 1, movetoworkspace, 1

# SUPER + SHIFT + 2 → Mueve al escritorio 2
bind = $mod SHIFT, 2, movetoworkspace, 2

# SUPER + SHIFT + 3 → Mueve al escritorio 3
bind = $mod SHIFT, 3, movetoworkspace, 3

# SUPER + SHIFT + 4 → Mueve al escritorio 4
bind = $mod SHIFT, 4, movetoworkspace, 4

# SUPER + SHIFT + 5 → Mueve al escritorio 5
bind = $mod SHIFT, 5, movetoworkspace, 5

# ===================================================
# AUDIO
# ===================================================
# F5 → Silenciar / des-silenciar con notificación
bind = , F5, exec, ~/.config/hypr/scripts/volume.sh mute

# F6 → Bajar volumen 5% con notificación
bind = , F6, exec, ~/.config/hypr/scripts/volume.sh down

# F7 → Subir volumen 5% con notificación
bind = , F7, exec, ~/.config/hypr/scripts/volume.sh up

# Teclas multimedia (si tu teclado las tiene)
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
# ===================================================
# BRILLO DE PANTALLA
# ===================================================
# F3 → Bajar brillo 5% con notificación
bind = , F3, exec, ~/.config/hypr/scripts/brightness.sh down

# F4 → Subir brillo 5% con notificación
bind = , F4, exec, ~/.config/hypr/scripts/brightness.sh up

# Teclas multimedia de brillo
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up

# ===================================================
# CAPTURAS DE PANTALLA
# ===================================================

# Print (Impr Pant) → Captura de pantalla completa, guardada con fecha
bind = , Print, exec, grim ~/Imágenes/screenshot-$(date +%Y%m%d-%H%M%S).png

# Print (Impr Pant) → Menú de captura (requiere el script ~/.config/hypr/screenshot.sh)
bind = , Print, exec, ~/.config/hypr/screenshot.sh

# ===================================================
# BLOQUEO DE PANTALLA
# ===================================================

# SUPER + L → Bloquea la pantalla con hyprlock
bind = $mod, L, exec, hyprlock

# ===================================================
# MODO RESIZE (redimensionar ventanas con teclas)
# ===================================================
# SUPER + SHIFT + R → Entra en modo resize.
# Mientras estés en este modo, las flechas redimensionan la ventana activa.
# ESC o ENTER para salir del modo resize.

bind = $mod SHIFT, R, submap, resize

submap = resize

# Flecha derecha: aumenta 20 píxeles de ancho
bind = , right, resizeactive, 20 0

# Flecha izquierda: reduce 20 píxeles de ancho
bind = , left, resizeactive, -20 0

# Flecha arriba: reduce 20 píxeles de alto
bind = , up, resizeactive, 0 -20

# Flecha abajo: aumenta 20 píxeles de alto
bind = , down, resizeactive, 0 20

# ESC → Salir del modo resize
bind = , escape, submap, reset

# ENTER → Salir del modo resize
bind = , return, submap, reset

submap = reset

# ===================================================
# ATAJOS ADICIONALES MUY RECOMENDADOS
# ===================================================

# --- Manipulación de ventanas ---

# SUPER + W → Cambia la ventana activa a modo flotante (o la devuelve al mosaico)
bind = $mod, W, togglefloating

# SUPER + S → Pseudo-tile: mantiene la ventana en el mosaico pero con su tamaño original
bind = $mod, S, pseudo


# SUPER + G → Agrupa la ventana activa con la siguiente (modo pestañas)
bind = $mod, G, togglegroup

# SUPER + TAB → Cambia entre las ventanas del grupo actual
bind = $mod, Tab, changegroupactive

# --- Moverse entre escritorios con la rueda del ratón sobre la barra ---
# (requiere configuración en waybar para que funcione)

# SUPER + rueda del ratón → Cambia al escritorio siguiente/anterior
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# --- Mover ventanas con el ratón sin necesidad de bordes ---
# SUPER + click izquierdo (mantener) → Arrastrar ventana flotante
bindm = $mod, mouse:272, movewindow

# SUPER + click derecho (mantener) → Redimensionar ventana flotante
bindm = $mod, mouse:273, resizewindow

# --- Abrir directamente aplicaciones comunes (opcional) ---
# SUPER + B → Abre navegador Brave (cámbialo por tu navegador)
# bind = $mod, B, exec, brave

# SUPER + N → Abre administrador de archivos Nautilus (ya lo tienes con E)
# bind = $mod, N, exec, nautilus

# --- Atajos multimedia adicionales ---
# Reproducir / Pausar
bind = , XF86AudioPlay, exec, playerctl play-pause

# Siguiente canción
bind = , XF86AudioNext, exec, playerctl next

# Canción anterior
bind = , XF86AudioPrev, exec, playerctl previous

# --- Lanzar Rofi con menú de ventanas abiertas ---
# SUPER + TAB (alternativa: si no usas grupos) → muestra ventanas abiertas
# bind = $mod, Tab, exec, rofi -show window

# --- Recargar Hyprland sin cerrar sesión ---
# SUPER + SHIFT + C → Recarga la configuración de Hyprland
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod, N, exec, ~/.config/eww/toggle-popup.shenv = GTK_THEME,Yaru-dark
env = GTK_THEME,Yaru-dark

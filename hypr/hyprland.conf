# ===================================================
# CONFIGURACIÓN DE HYPRLAND
# ===================================================

# ─── MONITOR ────────────────────────────────
monitor=,preferred,auto,1

# ─── PROGRAMAS QUE SE INICIAN AUTOMÁTICAMENTE ───
exec-once = waybar                                    # barra de estado
exec-once = eww daemon
exec-once = swaync
exec-once = awww-daemon                               # demonio para fondos animados
exec-once = awww img /home/jaider/Pictures/fondo.jpeg  # establece fondo con awww
exec-once = hypridle                                  # gestor de inactividad
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1  
exec-once = wl-paste --type text --watch cliphist store   
exec-once = wl-paste --type image --watch cliphist store  
exec-once = nm-applet                                 
exec-once = systemctl --user start battery-monitor.service usb-monitor.service
exec-once = ~/.config/hypr/scripts/close-panels.py
exec-once = ~/.config/hypr/scripts/clean-workspaces.sh    # limpia workspaces vacíos automáticamente

# ─── VARIABLES DE ENTORNO ─────────────────
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ─── ENTRADA ──────────────────────────────
input {
    kb_layout = es
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 1.2
    accel_profile = adaptive
}

# ─── APARIENCIA GENERAL ──────────────────
cursor {
    no_hardware_cursors = true
}

general {
    gaps_in = 8
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(1e1e2eaa)
    layout = dwindle
}

# ─── DECORACIONES Y DESENFOQUE ────────────
decoration {
    rounding = 20
    blur {
        enabled = true
        size = 8         # Un pelo más bajo para optimizar rendimiento
        passes = 3       # 3 pasadas mantiene un excelente difuminado sin ahogar la GPU
        new_optimizations = true
        vibrancy = 0.16  # Le da un toque más vivo al blur
    }
}

# ─── ANIMACIONES ──────────────────────────
animations {
    enabled = true

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 3, smoothIn, slide
    animation = fade, 1, 3, smoothIn
    animation = workspaces, 1, 4, smoothIn, slide
}

# ─── COMPORTAMIENTO DE DWINDLE ─────────────
dwindle {
    preserve_split = true
}

# ─── MISCELÁNEA ───────────────────────────
misc {
    force_default_wallpaper = 0          
    disable_hyprland_logo = true         
}

# Gestos de Touchpad
gesture = 3, horizontal, workspace      # 3 dedos izq/der → cambiar workspace
gesture = 3, up, exec, ~/.config/hypr/scripts/window-switcher.sh  # 3 dedos arriba → vista general de ventanas
gesture = 3, down, float                # 3 dedos abajo → flotar ventana
gesture = 4, down, close                # 4 dedos abajo → cerrar ventana
# =====================================================================
# TECLA MODIFICADORA Y ATAJOS
# =====================================================================
$mod = SUPER

# Lanzamiento de Programas
bind = $mod, Q, exec, kitty
bind = $mod, C, killactive
bind = $mod, M, exit
bind = $mod, E, exec, nautilus
bind = $mod, R, exec, rofi -show drun
bind = $mod, F, fullscreen
bind = $mod, T, exec, firefox
bind = $mod, N, exec, ~/.config/eww/toggle-popup.sh

# Historial de Portapapeles
bind = $mod, V, exec, cliphist list | rofi -dmenu -theme-str 'inputbar {enabled: false;}' | cliphist decode | wl-copy
# [NUEVO] SUPER + SHIFT + V → Borra todo el historial de cliphist por seguridad
bind = $mod SHIFT, V, exec, cliphist wipe

# Movimiento del Foco
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Mover Ventanas (Mosaico)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Ir a Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Mover Ventana a Workspace (Y saltar con ella)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# [NUEVO] Mover Ventana a Workspace Silenciosamente (La mandas allá sin moverte tú)
# Se usa con Ctrl + Shift + Número
bind = $mod CTRL SHIFT, 1, movetoworkspacesilent, 1
bind = $mod CTRL SHIFT, 2, movetoworkspacesilent, 2
bind = $mod CTRL SHIFT, 3, movetoworkspacesilent, 3
bind = $mod CTRL SHIFT, 4, movetoworkspacesilent, 4
bind = $mod CTRL SHIFT, 5, movetoworkspacesilent, 5

# Control de Audio
bind = , F5, exec, ~/.config/hypr/scripts/volume.sh mute
bind = , F6, exec, ~/.config/hypr/scripts/volume.sh down
bind = , F7, exec, ~/.config/hypr/scripts/volume.sh up
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up

# Control de Brillo
bind = , F3, exec, ~/.config/hypr/scripts/brightness.sh down
bind = , F4, exec, ~/.config/hypr/scripts/brightness.sh up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up

# Retroiluminación Teclado
bind = , XF86KbdBrightnessUp, exec, ~/.config/hypr/scripts/keyboard-backlight.sh up
bind = , XF86KbdBrightnessDown, exec, ~/.config/hypr/scripts/keyboard-backlight.sh down

# Extras y Energía
bind = , XF86PowerOff, exec, ~/.config/hypr/scripts/powermenu.sh
bind = $mod SHIFT, S, exec, ~/.config/hypr/screenshot.sh
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, C, exec, hyprctl reload

# Modo Resize
bind = $mod SHIFT, R, submap, resize
submap = resize
bind = , right, resizeactive, 20 0
bind = , left, resizeactive, -20 0
bind = , up, resizeactive, 0 -20
bind = , down, resizeactive, 0 20
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Extras del Ratón y Ventanas
bind = $mod, W, togglefloating
bind = $mod, S, pseudo
bind = $mod, G, togglegroup
bind = $mod, Tab, changegroupactive
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Multimedia Playerctl
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ===================================================
# CONFIGURACIÓN DE HYPRLAND
# ===================================================

# ─── MONITOR ────────────────────────────────
monitor=,preferred,auto,1

# ─── WORKSPACES ────────────────────────────
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# Comportamiento al mover ventanas entre workspaces
workspace_swipe_forever = true

# ─── PROGRAMAS QUE SE INICIAN AUTOMÁTICAMENTE ───
exec-once = waybar                                    # barra de estado
exec-once = eww daemon
exec-once = swaync
exec-once = awww-daemon                               # demonio para fondos animados
exec-once = awww img /home/jaider/Pictures/fondo.png   # establece fondo con awww
exec-once = hypridle                                  # gestor de inactividad
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1  
exec-once = QT_QPA_PLATFORMTHEME=qt6ct copyq               # gestor portapapeles (GUI con imagenes)
exec-once = nm-applet                                 
exec-once = systemctl --user start battery-monitor.service usb-monitor.service
exec-once = ~/.config/hypr/scripts/close-panels.py

# ─── WINDOW RULES ─────────────────────────
windowrule = float on, match:title ^(Calculator|Calculadora|Qalculate|Pix|Color Picker)$
windowrule = float on, match:class ^(pavucontrol|blueman-manager|org.gnome.Calculator|org.gnome.NautilusPreferences|Lxappearance|Arandr|feh|mpv|xdg-desktop-portal-gtk)$
windowrule = float on, center on, size 800 600, match:title ^(Picture-in-Picture|PiP)$
windowrule = opacity 0.95 0.95, match:class ^kitty$
windowrule = opacity 0.90 0.90, match:class ^firefox$

# ─── VARIABLES DE ENTORNO ─────────────────
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct

# ─── ENTRADA ──────────────────────────────
input {
    kb_layout = es
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 1.2
    accel_profile = adaptive
}

# ─── APARIENCIA GENERAL ──────────────────
cursor {
    no_hardware_cursors = true
}

general {
    gaps_in = 8
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(1e1e2eaa)
    layout = dwindle
}

# ─── DECORACIONES Y DESENFOQUE ────────────
decoration {
    rounding = 20
    blur {
        enabled = true
        size = 8         # Un pelo más bajo para optimizar rendimiento
        passes = 3       # 3 pasadas mantiene un excelente difuminado sin ahogar la GPU
        new_optimizations = true
        vibrancy = 0.16  # Le da un toque más vivo al blur
    }
}

# ─── ANIMACIONES ──────────────────────────
animations {
    enabled = true

    # Curvas bezier
    bezier = fluents, 0.25, 0.1, 0.25, 1.0
    bezier = bouncy, 0.05, 0.9, 0.1, 1.05
    bezier = snappy, 0.2, 0.0, 0.0, 1.0
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.2, 0.9, 0.1, 1.05

    # Ventanas
    animation = windows, 1, 7, fluents, slide
    animation = windowsOut, 1, 5, fluents, slide
    animation = windowsMove, 1, 5, fluents, slide

    # Fade
    animation = fade, 1, 4, fluents
    animation = fadeDim, 1, 3, fluents

    # Workspaces
    animation = workspaces, 1, 6, bouncy, slide
    animation = specialWorkspace, 1, 6, bouncy, slide

    # Borde animado al cambiar foco
    animation = border, 1, 8, fluents
}

# ─── COMPORTAMIENTO DE DWINDLE ─────────────
dwindle {
    preserve_split = true
}

# ─── MISCELÁNEA ───────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# =====================================================================
# TECLA MODIFICADORA Y ATAJOS
# =====================================================================
$mod = SUPER

# Lanzamiento de Programas
bind = $mod, Q, exec, kitty
bind = $mod, C, killactive
bind = $mod, M, exit
bind = $mod, E, exec, nautilus
bind = $mod, R, exec, rofi -show drun
bind = $mod, F, fullscreen
bind = $mod, T, exec, firefox
bind = $mod, N, exec, ~/.config/eww/toggle-popup.sh

# Historial de Portapapeles (CopyQ — GUI con imágenes)
bind = $mod, V, exec, copyq toggle
# Limpiar historial completo
bind = $mod SHIFT, V, exec, copyq clear && notify-send "Cliphist" "Historial limpiado"

# Movimiento del Foco
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Mover Ventanas (Mosaico)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Control de Audio
bind = , F5, exec, ~/.config/hypr/scripts/volume.sh mute
bind = , F6, exec, ~/.config/hypr/scripts/volume.sh down
bind = , F7, exec, ~/.config/hypr/scripts/volume.sh up
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up

# Control de Brillo
bind = , F3, exec, ~/.config/hypr/scripts/brightness.sh down
bind = , F4, exec, ~/.config/hypr/scripts/brightness.sh up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up

# Retroiluminación Teclado
bind = , XF86KbdBrightnessUp, exec, ~/.config/hypr/scripts/keyboard-backlight.sh up
bind = , XF86KbdBrightnessDown, exec, ~/.config/hypr/scripts/keyboard-backlight.sh down

# Scratchpad (minimizar/recuperar al vuelo)
bind = $mod, SPACE, togglespecialworkspace
bind = $mod SHIFT, SPACE, movetoworkspace, special

# Color picker
bind = $mod, C, exec, hyprpicker -a | xargs -I {} notify-send "Color copiado" "{}"
bind = $mod SHIFT, P, exec, hyprpicker -a && notify-send "Color picker" "Color copiado al portapapeles"

# Screenshot — región con GUI (dimensionar, dibujar, ajustar), pantalla directo
bind = $mod, Print, exec, flameshot gui -c && notify-send "Screenshot" "Región copiada al portapapeles"
bind = $mod SHIFT, Print, exec, grim - | wl-copy && notify-send "Screenshot" "Pantalla copiada al portapapeles"
bind = , Print, exec, flameshot gui -c && notify-send "Screenshot" "Región copiada al portapapeles"

# Extras y Energía
bind = , XF86PowerOff, exec, ~/.config/hypr/scripts/powermenu.sh
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, C, exec, hyprctl reload

# Toggle split layout
bind = $mod, D, layoutmsg, togglesplit

# Quick note
bind = $mod SHIFT, N, exec, ~/.config/hypr/scripts/quicknote.sh

# Pomodoro toggle
bind = $mod SHIFT, T, exec, ~/.config/hypr/scripts/pomodoro.sh toggle

# Monitor layout
bind = $mod, P, exec, ~/.config/hypr/scripts/monitor-layout.sh

# Modo Resize
bind = $mod SHIFT, R, submap, resize
submap = resize
bind = , right, resizeactive, 20 0
bind = , left, resizeactive, -20 0
bind = , up, resizeactive, 0 -20
bind = , down, resizeactive, 0 20
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Extras del Ratón y Ventanas
bind = $mod, W, togglefloating
bind = $mod, S, pseudo
bind = $mod, G, togglegroup
bind = $mod, Tab, changegroupactive

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Switcher de ventanas estilo Ubuntu (Alt+Tab)
bind = ALT, Tab, exec, rofi -show window

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace (and follow)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move window silently to workspace
bind = $mod CTRL, 1, movetoworkspacesilent, 1
bind = $mod CTRL, 2, movetoworkspacesilent, 2
bind = $mod CTRL, 3, movetoworkspacesilent, 3
bind = $mod CTRL, 4, movetoworkspacesilent, 4
bind = $mod CTRL, 5, movetoworkspacesilent, 5
bind = $mod CTRL, 6, movetoworkspacesilent, 6
bind = $mod CTRL, 7, movetoworkspacesilent, 7
bind = $mod CTRL, 8, movetoworkspacesilent, 8
bind = $mod CTRL, 9, movetoworkspacesilent, 9
bind = $mod CTRL, 0, movetoworkspacesilent, 10

# Multimedia Playerctl
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

exec-once = ~/.config/hypr/scripts/gestures.sh

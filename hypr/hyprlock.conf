background {
    monitor =
    path = /home/jaider/Pictures/fondo.jpeg
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.15
    outer_color = rgb(cba6f7)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Contraseña</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
    fail_timeout = 3000
}

# Hora principal
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(cdd6f4)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 240
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B")"
    color = rgb(a6adc8)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 170
    halign = center
    valign = center
}

# Uptime del sistema
label {
    monitor =
    text = cmd[update:60] echo "Encendido: $(uptime -p | sed 's/up //')"
    color = rgb(6c7086)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -140
    halign = center
    valign = center
}
